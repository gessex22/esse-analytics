<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, viewport-height=device-height" />
    <title>EsseAnalytics</title>
    <!-- Apply theme class synchronously to avoid FOUC on load/return -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('videx-theme');
          document.documentElement.classList.add('theme-' + (t === 'ambar' || t === 'rojo' ? t : 'rojo'));
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
